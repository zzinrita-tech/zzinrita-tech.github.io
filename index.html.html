<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Opening Checklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#111111;--black2:#222222;
  --gray1:#f4f4f2;--gray2:#e8e8e4;--gray3:#b8b8b0;--gray4:#888880;
  --white:#ffffff;--text:#111111;--text2:#555550;--text3:#999990;
  --border:rgba(0,0,0,.12);--border-dark:rgba(0,0,0,.22);
  --r-sm:6px;--r-md:10px;--r-lg:14px;
  --sh:0 1px 4px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 16px rgba(0,0,0,.10);
}
body{font-family:'Inter',sans-serif;background:#f6f6f5;color:var(--text);height:100vh;overflow:hidden;display:flex;letter-spacing:-.01em}

/* SIDEBAR */
.sidebar{width:220px;min-width:220px;background:var(--black);display:flex;flex-direction:column;height:100vh;position:relative;overflow:hidden}
.sidebar-logo{padding:22px 20px 20px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:8px}
.sidebar-logo-title{font-family:'Bebas Neue',sans-serif;font-size:26px;color:#fff;letter-spacing:.08em;line-height:1}
.sidebar-logo-sub{font-size:9px;font-weight:400;color:rgba(255,255,255,.35);letter-spacing:.1em;text-transform:uppercase;margin-top:3px}
.nav-section-label{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.25);padding:14px 20px 5px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:12.5px;font-weight:400;color:rgba(255,255,255,.55);cursor:pointer;transition:all .15s;user-select:none;position:relative}
.nav-item:hover{color:rgba(255,255,255,.9);background:rgba(255,255,255,.05)}
.nav-item.active{color:var(--black);background:var(--white);font-weight:600}
.nav-item.active i{color:var(--black)}
.nav-item i{font-size:16px;flex-shrink:0;color:rgba(255,255,255,.35)}
.nav-item:hover i{color:rgba(255,255,255,.7)}
.nav-badge{margin-left:auto;font-size:9px;font-weight:700;background:rgba(255,255,255,.12);color:rgba(255,255,255,.5);padding:2px 6px;border-radius:3px;letter-spacing:.04em}
.nav-item.active .nav-badge{background:rgba(0,0,0,.08);color:var(--text3)}
.sidebar-footer{margin-top:auto;padding:12px 12px 20px;border-top:1px solid rgba(255,255,255,.08)}
.sidebar-stats{padding:12px 20px;margin-bottom:4px}
.sidebar-stats-label{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.28);margin-bottom:8px}
.sidebar-prog-wrap{height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin-bottom:6px}
.sidebar-prog-fill{height:100%;background:#fff;border-radius:2px;transition:width .4s}
.sidebar-prog-num{font-family:'Bebas Neue',sans-serif;font-size:18px;color:#fff;letter-spacing:.04em}
.sidebar-prog-sub{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:.04em;text-transform:uppercase}
.reset-link{display:flex;align-items:center;gap:7px;padding:9px 14px;font-size:11.5px;font-weight:500;color:rgba(255,255,255,.4);cursor:pointer;border:1px solid rgba(255,255,255,.1);border-radius:var(--r-sm);transition:all .15s;letter-spacing:.01em}
.reset-link:hover{color:#fff;border-color:rgba(255,255,255,.35);background:rgba(255,255,255,.05)}
.reset-link i{font-size:14px}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* TOPBAR */
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 22px;display:flex;align-items:center;gap:4px;min-height:46px;flex-shrink:0;overflow-x:auto}
.topbar::-webkit-scrollbar{height:2px}
.topbar::-webkit-scrollbar-thumb{background:var(--black);border-radius:1px}
.phase-tab{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--r-sm);font-size:11.5px;font-weight:400;cursor:pointer;white-space:nowrap;color:var(--text2);transition:all .14s;border:1px solid transparent;flex-shrink:0}
.phase-tab:hover{background:var(--gray1)}
.phase-tab.active{background:var(--black);color:#fff;font-weight:600;border-color:var(--black)}
.phase-tab i{font-size:12px;opacity:.5}
.phase-tab.active i{opacity:1}
.topbar-meta{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.filter-btn{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:var(--r-sm);font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border-dark);background:var(--gray1);color:var(--text2);transition:all .14s;white-space:nowrap}
.filter-btn:hover{background:var(--gray2)}
.filter-btn.on{background:var(--black);color:#fff;border-color:var(--black)}
.filter-btn i{font-size:13px}

/* CONTENT */
.content{padding:18px 22px;overflow-y:auto;flex:1}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .25s ease both}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden}

.stat-num{font-family:'Inter',sans-serif;font-weight:500;font-size:20px;letter-spacing:-.01em;line-height:1.2;color:var(--text);margin-bottom:2px}
.stat-label{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3)}
.stat-sub{font-size:10px;color:var(--text3);margin-top:4px}
.stat-pct{font-family:'Inter',sans-serif;font-weight:500;font-size:20px;letter-spacing:-.01em;color:var(--text)}
.ring-small{width:44px;height:44px;position:absolute;right:14px;top:50%;transform:translateY(-50%)}
.ring-small svg{width:44px;height:44px}

/* SECTION CARDS */
.section-grid{display:flex;flex-direction:column;gap:12px}
.sec-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh);overflow:hidden}
.sec-header{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;user-select:none;transition:background .12s}
.sec-header:hover{background:var(--gray1)}
.sec-icon{width:30px;height:30px;border-radius:6px;background:var(--black);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sec-icon i{font-size:15px;color:#fff}
.sec-name{font-size:13px;font-weight:600;color:var(--text);flex:1;min-width:0;line-height:1.3}
.sec-sub{font-size:10px;color:var(--text3);margin-top:1px;letter-spacing:.02em}
.sec-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.sec-count{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.04em;color:var(--text3)}
.sec-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:3px;letter-spacing:.03em}
.badge-done{background:var(--black);color:#fff}
.badge-part{background:var(--gray2);color:var(--text2)}
.badge-none{background:var(--gray1);color:var(--text3)}
.sec-chevron{font-size:11px;color:var(--text3);transition:transform .2s}
.sec-chevron.open{transform:rotate(180deg)}
.sec-prog{height:2px;background:var(--gray2);overflow:hidden}
.sec-prog-fill{height:100%;background:var(--black);transition:width .5s cubic-bezier(.4,0,.2,1)}
.sec-body{display:none;border-top:1px solid var(--border)}
.sec-body.open{display:block}

/* GROUP inside section */
.group-label{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:10px 16px 5px;background:var(--gray1);border-bottom:1px solid var(--border)}

/* TASK ROW */
.task-row{display:flex;align-items:flex-start;gap:10px;padding:9px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.task-row:last-child{border-bottom:none}
.task-row:hover{background:var(--gray1)}
.task-row.done .task-text{color:var(--text3);text-decoration:line-through}
.task-cb{width:18px;height:18px;min-width:18px;border-radius:4px;border:1.5px solid var(--gray3);display:flex;align-items:center;justify-content:center;margin-top:1px;flex-shrink:0;transition:all .15s;background:var(--white);font-size:11px;color:transparent;line-height:1}
.task-cb.chk{background:var(--black);border-color:var(--black);color:#fff}
.task-text{font-size:12px;color:var(--text2);line-height:1.45;flex:1}
.crit-dot{width:5px;height:5px;min-width:5px;border-radius:50%;background:#e24b4a;margin-top:6px;flex-shrink:0}
.task-tag{font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px;background:var(--gray2);color:var(--text3);letter-spacing:.04em;white-space:nowrap;margin-top:2px;flex-shrink:0}

/* WMK COLUMNS (COM tab) */
.wmk-head{display:flex;align-items:center;gap:10px;padding:7px 16px;border-bottom:1px solid var(--border);background:var(--gray1)}
.wmk-head-text{flex:1}
.wmk-head-col{width:18px;min-width:18px;text-align:center;font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.03em}
.wmk-row{cursor:default}
.wmk-text{cursor:default}
.wmk-cb{cursor:pointer}
.desc-chevron{display:inline-block;margin-left:6px;font-size:9px;color:var(--text3);transition:transform .2s}
.desc-chevron.open{transform:rotate(180deg)}
.desc-row{padding:8px 16px 12px 16px;background:var(--gray1);border-bottom:1px solid var(--border)}
.desc-text{font-size:11.5px;color:var(--text2);line-height:1.55;padding-left:2px;border-left:2px solid var(--gray3);padding-left:10px}

/* EMPTY */
.empty-state{padding:40px 20px;text-align:center;color:var(--text3);font-size:12px}
.empty-state i{font-size:28px;opacity:.25;display:block;margin-bottom:8px}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div style="font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#fff;line-height:1.6">OPENING</div>
    <div style="font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.35)">CHECKLIST</div>
  </div>

  <div class="nav-section-label">Разделы</div>
  <div class="nav-item active" onclick="switchSection('calendar')" id="nav-calendar">
    Календарь
    <span class="nav-badge" id="nb-calendar">—</span>
  </div>
  <div class="nav-item" onclick="switchSection('general')" id="nav-general">
    General + IT
    <span class="nav-badge" id="nb-general">—</span>
  </div>
  <div class="nav-item" onclick="switchSection('op')" id="nav-op">
    OP Tasks
    <span class="nav-badge" id="nb-op">—</span>
  </div>
  <div class="nav-item" onclick="switchSection('com')" id="nav-com">
    COM Tasks
    <span class="nav-badge" id="nb-com">—</span>
  </div>
  <div class="nav-item" onclick="switchSection('hr')" id="nav-hr">
    HR Tasks
    <span class="nav-badge" id="nb-hr">—</span>
  </div>
  <div class="nav-item" onclick="switchSection('meetings')" id="nav-meetings">
    Собрания
  </div>
  <div class="nav-item" onclick="switchSection('fix')" id="nav-fix">
    FIX MNG
  </div>

  <div class="sidebar-stats">
    <div class="sidebar-stats-label">Общий прогресс</div>
    <div class="sidebar-prog-fill-wrap" style="height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin-bottom:8px">
      <div class="sidebar-prog-fill" id="global-prog-bar" style="width:0%"></div>
    </div>
    <div style="display:flex;align-items:baseline;gap:6px">
      <div class="sidebar-prog-num" id="global-pct">0%</div>
      <div class="sidebar-prog-sub" id="global-frac">0 / 0 задач</div>
    </div>
  </div>

  <div class="sidebar-footer">
    <div class="reset-link" onclick="resetAll()">
      Сбросить всё
    </div>
  </div>
</aside>

<div class="main">
  <div class="topbar" id="topbar">
    <div class="topbar-meta">
      <div class="filter-btn" id="fb-all" onclick="setFilter('all')">Все</div>
      <div class="filter-btn" id="fb-pending" onclick="setFilter('pending')">Осталось</div>
      <div class="filter-btn" id="fb-done" onclick="setFilter('done')">Выполнено</div>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>

var ST = {};
try{ ST = JSON.parse(localStorage.getItem('lime_opening_v2')||'{}'); }catch(e){}
function save(){ try{ localStorage.setItem('lime_opening_v2', JSON.stringify(ST)); }catch(e){} }

// ── Custom meetings (user-added) ──────────────────────────────
function getCustomMeetings(){ return ST['custom_meetings'] || []; }
function addCustomMeeting(di, label, text){
  var arr = getCustomMeetings();
  arr.push({di:di, label:label, text:text});
  ST['custom_meetings'] = arr;
  save();
  renderContent();
}
function deleteCustomMeeting(idx){
  var arr = getCustomMeetings();
  arr.splice(idx, 1);
  ST['custom_meetings'] = arr;
  save();
  renderContent();
}
function toggleCustomMeeting(idx){
  var k = 'custom_meet_done__'+idx;
  ST[k] = !ST[k];
  save();
  renderContent();
}

// ── Custom trainings (user-added) ─────────────────────────────
function getCustomTrainings(){ return ST['custom_trainings'] || []; }
function addCustomTraining(blockName, topic, participants){
  var arr = getCustomTrainings();
  arr.push({blockName:blockName, topic:topic, participants:participants});
  ST['custom_trainings'] = arr;
  save();
  renderContent();
}
function deleteCustomTraining(idx){
  var arr = getCustomTrainings();
  arr.splice(idx, 1);
  ST['custom_trainings'] = arr;
  save();
  renderContent();
}

// ── Add-form toggle state ──────────────────────────────────────
var addMeetFormDay = null;
var addTrainFormBlock = null;
function showAddMeetForm(di){ addMeetFormDay = (addMeetFormDay===di?null:di); addTrainFormBlock=null; renderContent(); }
function showAddTrainForm(bn){ addTrainFormBlock = (addTrainFormBlock===bn?null:bn); addMeetFormDay=null; renderContent(); }
function submitAddMeeting(){
  var di = addMeetFormDay;
  var label = document.getElementById('amLabel').value.trim();
  var text = document.getElementById('amText').value.trim();
  if(!label) return;
  addMeetFormDay = null;
  addCustomMeeting(di, label, text);
}
function submitAddTraining(){
  var bn = addTrainFormBlock;
  var topic = document.getElementById('atTopic').value.trim();
  var participants = document.getElementById('atPart').value.trim();
  if(!topic) return;
  addTrainFormBlock = null;
  addCustomTraining(bn, topic, participants);
}

var curSec = 'calendar';
var curFilter = 'all';
var curMeetingsSubTab = 'morning';
var curGeneralSubTab = 'general';
var openSections = {};
var expandedDesc = {};

function key(sec, si, ti){ return sec+'__'+si+'__'+ti; }
function wmkKey(si, ti, col){ return 'com__'+si+'__'+ti+'__'+col; }

function switchSection(s){
  curSec = s;
  document.querySelectorAll('.nav-item').forEach(function(n){
    n.classList.toggle('active', n.id === 'nav-'+s);
  });
  renderContent();
}

function setFilter(f){
  curFilter = f;
  ['all','pending','done'].forEach(function(x){
    document.getElementById('fb-'+x).classList.toggle('on', x===f);
  });
  renderContent();
}

function toggleSection(sid){
  openSections[sid] = !openSections[sid];
  renderContent();
}

function toggle(sec, si, ti){
  var k = key(sec,si,ti);
  ST[k] = !ST[k];
  save();
  updateGlobals();
  renderContent();
}

function toggleWmk(si, ti, col){
  var k = wmkKey(si, ti, col);
  ST[k] = !ST[k];
  save();
  updateGlobals();
  renderContent();
}

function toggleDesc(si, ti){
  var k = si+'__'+ti;
  expandedDesc[k] = !expandedDesc[k];
  renderContent();
}

function toggleDescGen(secKey, si, ti){
  var k = secKey+'__'+si+'__'+ti;
  expandedDesc[k] = !expandedDesc[k];
  renderContent();
}

function sectionStats(secKey, tasks){
  var done = 0;
  tasks.forEach(function(t,ti){ if(ST[key(secKey,0,ti)]) done++; });
  return {done:done, total:tasks.length};
}

function globalStats(){
  var total=0, done=0;
  Object.keys(DATA).forEach(function(secKey){
    if(secKey === 'general'){
      var effective = getEffectiveGenTasks(DATA.general.sections);
      DATA.general.sections.forEach(function(sec, si){
        effective[si].forEach(function(task){
          total++;
          if(ST[key('general', si, task.t)]) done++;
        });
      });
    } else if(secKey === 'op'){
      var effectiveOp = getEffectiveSecTasks('op', DATA.op.sections);
      DATA.op.sections.forEach(function(sec, si){
        effectiveOp[si].forEach(function(task){
          total++;
          if(ST[key('op', si, task.t)]) done++;
        });
      });
    } else if(secKey === 'hr'){
      var effectiveHr = getEffectiveSecTasks('hr', DATA.hr.sections);
      DATA.hr.sections.forEach(function(sec, si){
        effectiveHr[si].forEach(function(task){
          total++;
          if(ST[key('hr', si, task.t)]) done++;
        });
      });
    } else if(secKey === 'com'){
      var effectiveCom = getEffectiveSecTasks('com', DATA.com.sections);
      DATA.com.sections.forEach(function(sec, si){
        effectiveCom[si].forEach(function(task, ti){
          ['w','m','k'].forEach(function(col){ total++; if(ST[wmkKey(si,ti,col)]) done++; });
        });
      });
    } else {
      DATA[secKey].sections.forEach(function(sec, si){
        sec.tasks.forEach(function(t,ti){
          if(secKey === 'com'){
            ['w','m','k'].forEach(function(col){
              total++;
              if(ST[wmkKey(si,ti,col)]) done++;
            });
          } else {
            total++;
            if(ST[key(secKey,si,ti)]) done++;
          }
        });
      });
    }
  });
  CAL_MATRIX.rows.forEach(function(row){
    row.cells.forEach(function(cell,ci){
      cell.forEach(function(task){
        total++;
        if(ST[calKey(row.id,ci,task.t)]) done++;
      });
    });
  });
  return {total:total, done:done};
}

function updateGlobals(){
  var g = globalStats();
  var pct = g.total ? Math.round(g.done/g.total*100) : 0;
  document.getElementById('global-pct').textContent = pct+'%';
  document.getElementById('global-frac').textContent = g.done+' / '+g.total+' задач';
  document.getElementById('global-prog-bar').style.width = pct+'%';
  Object.keys(DATA).forEach(function(sk){
    var t=0,d=0;
    if(sk === 'general'){
      var eff = getEffectiveGenTasks(DATA.general.sections);
      DATA.general.sections.forEach(function(sec,si){
        eff[si].forEach(function(task){ t++; if(ST[key('general',si,task.t)]) d++; });
      });
    } else if(sk === 'op'){
      var effOp = getEffectiveSecTasks('op', DATA.op.sections);
      DATA.op.sections.forEach(function(sec,si){
        effOp[si].forEach(function(task){ t++; if(ST[key('op',si,task.t)]) d++; });
      });
    } else if(sk === 'hr'){
      var effHr = getEffectiveSecTasks('hr', DATA.hr.sections);
      DATA.hr.sections.forEach(function(sec,si){
        effHr[si].forEach(function(task){ t++; if(ST[key('hr',si,task.t)]) d++; });
      });
    } else if(sk === 'com'){
      var effCom = getEffectiveSecTasks('com', DATA.com.sections);
      DATA.com.sections.forEach(function(sec,si){
        effCom[si].forEach(function(task,ti){
          ['w','m','k'].forEach(function(col){ t++; if(ST[wmkKey(si,ti,col)]) d++; });
        });
      });
    } else {
      DATA[sk].sections.forEach(function(sec,si){
        sec.tasks.forEach(function(_,ti){
          if(sk === 'com'){
            ['w','m','k'].forEach(function(col){ t++; if(ST[wmkKey(si,ti,col)]) d++; });
          } else {
            t++; if(ST[key(sk,si,ti)]) d++;
          }
        });
      });
    }
    var nb = document.getElementById('nb-'+sk);
    if(nb) nb.textContent = d+'/'+t;
  });
}

// ── General drag-and-drop helpers ────────────────────────────
var genDragging = null;

function genDragStart(e){
  genDragging = {
    fromSi: parseInt(e.currentTarget.dataset.si),
    taskT: decodeURIComponent(e.currentTarget.dataset.task)
  };
  e.currentTarget.style.opacity = '0.4';
  e.dataTransfer.effectAllowed = 'move';
}
function genDragEnd(e){
  e.currentTarget.style.opacity = '';
  document.querySelectorAll('[data-gen-drop]').forEach(function(el){
    el.style.outline = ''; el.removeAttribute('data-gen-drop');
  });
  genDragging = null;
}
function genDragOver(e){
  if(!genDragging) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  var el = e.currentTarget;
  if(!el.dataset.genDrop){ el.dataset.genDrop='1'; el.style.outline='2px solid #111'; el.style.outlineOffset='-2px'; }
}
function genDragLeave(e){
  var el = e.currentTarget;
  if(!el.contains(e.relatedTarget)){ el.style.outline=''; el.style.outlineOffset=''; delete el.dataset.genDrop; }
}
function genDrop(e, toSi){
  e.preventDefault();
  if(!genDragging) return;
  if(genDragging.fromSi === toSi){ genDragging=null; renderContent(); return; }
  var moves = ST['gen_moves'] || [];
  var existing = moves.findIndex(function(m){ return m.taskT===genDragging.taskT; });
  if(existing>=0){ moves[existing].toSi = toSi; }
  else { moves.push({fromSi:genDragging.fromSi, taskT:genDragging.taskT, toSi:toSi}); }
  moves = moves.filter(function(m){ return m.fromSi !== m.toSi; });
  ST['gen_moves'] = moves;
  genDragging = null;
  save();
  renderContent();
}

function getEffectiveGenTasks(sections){
  var effective = sections.map(function(sec){ return sec.tasks.map(function(t){ return {t:t.t, c:t.c, desc:t.desc}; }); });
  var moves = ST['gen_moves'] || [];
  moves.forEach(function(m){
    var fromArr = effective[m.fromSi];
    if(!fromArr) return;
    var idx = fromArr.findIndex(function(t){ return t.t===m.taskT; });
    if(idx<0) return;
    var task = fromArr.splice(idx,1)[0];
    if(effective[m.toSi]) effective[m.toSi].push(task);
  });
  return effective;
}

function getEffectiveSecTasks(secKey, sections){
  var effective = sections.map(function(sec){ return sec.tasks.map(function(t){ return {t:t.t, c:t.c, desc:t.desc}; }); });
  var moves = ST[secKey+'_moves'] || [];
  moves.forEach(function(m){
    var fromArr = effective[m.fromSi];
    if(!fromArr) return;
    var idx = fromArr.findIndex(function(t){ return t.t===m.taskT; });
    if(idx<0) return;
    var task = fromArr.splice(idx,1)[0];
    if(effective[m.toSi]) effective[m.toSi].push(task);
  });
  return effective;
}

function toggleSecDragTask(secKey, si, encT){
  var t = decodeURIComponent(encT);
  ST[key(secKey, si, t)] = !ST[key(secKey, si, t)];
  save(); updateGlobals(); renderContent();
}

function renderTasksSecDrag(secKey, si, tasks){
  var html = '';
  var any = false;
  tasks.forEach(function(task){
    var done = !!ST[key(secKey, si, task.t)];
    if(curFilter==='pending'&&done) return;
    if(curFilter==='done'&&!done) return;
    any = true;
    var encT = encodeURIComponent(task.t);
    html += '<div class="task-row'+(done?' done':'')+'" draggable="true" '
      +'data-seckey="'+secKey+'" data-si="'+si+'" data-task="'+encT+'" '
      +'ondragstart="secDragStart(event)" ondragend="secDragEnd(event)" '
      +'style="cursor:grab">'
      +'<div class="task-cb'+(done?' chk':'')+'" onclick="event.stopPropagation();toggleSecDragTask(\''+secKey+'\','+si+',\''+encT+'\')">✓</div>'
      +(task.c?'<div class="crit-dot" title="Критичный пункт"></div>':'')
      +'<div class="task-text">'+task.t+'</div>'
      +'</div>';
  });
  if(!any) html='<div class="empty-state">'+(curFilter==='done'?'Нет выполненных задач':'Все задачи выполнены')+'</div>';
  return html;
}

function renderContent(){
  if(curSec === 'calendar'){ renderCalendar(); return; }
  if(curSec === 'fix'){ renderFix(); return; }
  if(curSec === 'meetings'){ renderMeetings(); return; }

  var secData = DATA[curSec];

  var indexedSections = secData.sections.map(function(sec, si){ return {sec:sec, si:si}; });

    indexedSections = indexedSections.filter(function(item){ return item.sec.block === curGeneralSubTab; });
  }

  var secDone=0, secTotal=0;
  indexedSections.forEach(function(item){
    item.sec.tasks.forEach(function(_,ti){
      secTotal++;
      if(ST[key(curSec,item.si,ti)]) secDone++;
    });

    +(pct>0?'<circle cx="20" cy="20" r="'+r+'" fill="none" stroke="#111" stroke-width="5"'

        secTotal++;
        if(ST[key('general', item.si, task.t)]) secDone++;
      });

  }

      effectiveOpTasks[item.si].forEach(function(task){
        secTotal++;
        if(ST[key('op', item.si, task.t)]) secDone++;

    });

    secDone = 0; secTotal = 0;

      effectiveHrTasks[item.si].forEach(function(task){
        secTotal++;
        if(ST[key('hr', item.si, task.t)]) secDone++;
      });
    });
    pct = secTotal ? Math.round(secDone/secTotal*100) : 0;
  }

    secDone = 0; secTotal = 0;
    indexedSections.forEach(function(item){

    } else {

      sec.tasks.forEach(function(_,ti){ if(ST[key(curSec,si,ti)]) sDone++; });

function shiftColor(code){
  if(code === 'M') return {bg:'#111', fg:'#fff'};
  if(code === 'D') return {bg:'#f0f0ee', fg:'#111'};
  if(code === 'E') return {bg:'#e8e8e4', fg:'#111'};
  if(code === 'OFF') return {bg:'#fff', fg:'#bbb'};
  if(code === 'VAC') return {bg:'#fdf0e8', fg:'#b8703a'};
  return {bg:'#fff', fg:'#ccc'};
}

// ── Meetings drag-and-drop ────────────────────────────────────
var meetDragging = null;

function meetDragStart(e){
  meetDragging = {
    type: e.currentTarget.dataset.mtype,  // 'static' or 'custom'
    ri: parseInt(e.currentTarget.dataset.ri||'-1'),
    customIdx: parseInt(e.currentTarget.dataset.cidx||'-1'),
    fromDi: parseInt(e.currentTarget.dataset.di)
  };
  e.currentTarget.style.opacity = '0.4';
  e.dataTransfer.effectAllowed = 'move';
}
function meetDragEnd(e){
  e.currentTarget.style.opacity = '';
  document.querySelectorAll('[data-meet-drop]').forEach(function(el){
    el.style.outline=''; el.removeAttribute('data-meet-drop');
  });
  meetDragging = null;
}
function meetDragOver(e){
  if(!meetDragging) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  var el = e.currentTarget;
  if(!el.dataset.meetDrop){ el.dataset.meetDrop='1'; el.style.outline='2px solid #111'; el.style.outlineOffset='-2px'; }
}
function meetDragLeave(e){
  var el = e.currentTarget;
  if(!el.contains(e.relatedTarget)){ el.style.outline=''; el.style.outlineOffset=''; delete el.dataset.meetDrop; }
}
function meetDrop(e, toDi){
  e.preventDefault();
  if(!meetDragging || meetDragging.fromDi === toDi){ meetDragging=null; renderContent(); return; }
  if(meetDragging.type === 'custom'){
    var arr = getCustomMeetings();
    if(arr[meetDragging.customIdx]) arr[meetDragging.customIdx].di = toDi;
    ST['custom_meetings'] = arr;
  } else {
    // static: store in meet_moves as {ri, fromDi, toDi}
    var moves = ST['meet_moves'] || [];
    var ex = moves.findIndex(function(m){ return m.ri===meetDragging.ri; });
    if(ex>=0){ moves[ex].toDi = toDi; }
    else { moves.push({ri: meetDragging.ri, fromDi: meetDragging.fromDi, toDi: toDi}); }
    moves = moves.filter(function(m){ return m.fromDi !== m.toDi; });
    ST['meet_moves'] = moves;
  }
  meetDragging = null;
  save(); renderContent();
}

    tmoves = tmoves.filter(function(m){ return m.fromBlock !== m.toBlock; });
    ST['train_moves'] = tmoves;
  }

}

function renderMorningMeetingsBody(){
  var days = MEETINGS_DATA.days;
  var rows = MEETINGS_DATA.rows;
  var custom = getCustomMeetings();
  var meetMoves = ST['meet_moves'] || [];

  // Build effective slots per day: rows with moves applied
  // effectiveRows[di] = array of {row, ri, moved} — static slots visible in this day
  var effectiveStaticByDay = days.map(function(){ return []; });
  rows.forEach(function(row, ri){
    var move = meetMoves.find(function(m){ return m.ri===ri; });
    var toDi = move ? move.toDi : null;
    // appears in original day unless moved; appears in target if moved
    days.forEach(function(day, di){
      var origDi = ri; // there's no per-row original day; original day = row shown in all days
      // Each static row appears in ALL days by default (same slot per day)
      // When moved, it disappears from fromDi and appears in toDi instead
      if(move){
        if(di === move.fromDi) return; // removed from original day
        if(di !== move.toDi) effectiveStaticByDay[di].push({row:row, ri:ri}); // still shown in other days
        else effectiveStaticByDay[di].push({row:row, ri:ri}); // shown in target day
      } else {
        effectiveStaticByDay[di].push({row:row, ri:ri});
      }
    });
  });

  // Simpler: each static row ri has a "home day" override if moved
  // Static rows appear in their home day slot (same slot text for all days)
  // For morning meetings: static rows belong to ALL days (3 rows × 7 days)
  // Move means: remove from fromDi, add to toDi (for display purposes)
  // Rebuild:
  var staticSlotsByDay = days.map(function(){ return []; });
  rows.forEach(function(row, ri){
    var move = meetMoves.find(function(m){ return m.ri===ri; });
    if(move){
      staticSlotsByDay[move.toDi].push({row:row, ri:ri, movedFrom:move.fromDi});
    } else {
      days.forEach(function(day,di){ staticSlotsByDay[di].push({row:row, ri:ri}); });
    }
  });

  var mTotal=0, mDone=0;
  days.forEach(function(day, di){
    staticSlotsByDay[di].forEach(function(s){ mTotal++; if(ST[meetKey(di,s.ri)]) mDone++; });
    custom.forEach(function(c,idx){ if(c.di===di){ mTotal++; if(ST['custom_meet_done__'+idx]) mDone++; }});
  });
  var mPct = mTotal ? Math.round(mDone/mTotal*100) : 0;

  var html = '';
  html += '<div style="font-size:10.5px;color:#999;margin-bottom:10px;padding:0 2px">✥ Перетащите собрание в другой день для переноса</div>';
  html += '<div class="stats-row">'
    +'<div class="stat-card accent"><div class="stat-label">Раздел</div><div class="stat-num">Утренние собрания</div></div>'
    +'<div class="stat-card"><div class="stat-label">Всего собраний</div><div class="stat-num">'+mTotal+'</div></div>'
    +'<div class="stat-card"><div class="stat-label">Проведено</div><div class="stat-num">'+mDone+'</div><div class="stat-sub" style="color:'+(mTotal===mDone&&mTotal>0?'#1d9e75':'var(--text3)')+'">осталось '+(mTotal-mDone)+'</div></div>'
    +'<div class="stat-card"><div class="stat-label">Прогресс</div><div class="stat-num">'+mPct+'%</div></div>'
    +'</div>';

  html += '<div class="section-grid">';
  days.forEach(function(day, di){
    var sid = 'meet__'+di;
    if(openSections[sid] === undefined) openSections[sid] = (di===0);
    var isOpen = openSections[sid];
    var dayCustom = custom.map(function(c,idx){ return {c:c,idx:idx}; }).filter(function(x){ return x.c.di===di; });
    var totalSlots = staticSlotsByDay[di].length + dayCustom.length;
    var dDone=0;

    dayCustom.forEach(function(x){ if(ST['custom_meet_done__'+x.idx]) dDone++; });
    var dPct = totalSlots ? Math.round(dDone/totalSlots*100) : 0;

      +'<div class="sec-header" onclick="toggleSection(\''+sid+'\')">'
        +'<div style="flex:1;min-width:0"><div class="sec-name">'+day+'</div><div class="sec-sub">'+totalSlots+' собрания · '+dPct+'% выполнено</div></div>'
        +'<div class="sec-right"><span class="sec-badge '+badgeCls+'">'+badgeTxt+'</span><div class="sec-chevron'+(isOpen?' open':'')+'">▾</div></div>'

function renderCalendar(){

    return row.cells.map(function(cell){ return cell.map(function(t){ return {t:t.t, orig:true}; }); });
  });

    var ri = rows.findIndex(function(r){ return r.id===m.rowId; });

// ── Calendar drag-and-drop ────────────────────────────────────
var calDragging = null;

function calDragStart(e){
  calDragging = {
    rowId: e.currentTarget.dataset.row,
    ci: parseInt(e.currentTarget.dataset.ci),
    taskT: decodeURIComponent(e.currentTarget.dataset.task)
  };
  e.currentTarget.style.opacity = '0.45';
  e.dataTransfer.effectAllowed = 'move';
}

function calDragEnd(e){
  e.currentTarget.style.opacity = '';
  document.querySelectorAll('[data-drop-target]').forEach(function(el){
    el.style.background=''; el.style.outline='';
    el.removeAttribute('data-drop-target');
  });
  calDragging = null;
}

function calDragOver(e){
  if(!calDragging) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  var td = e.currentTarget;
  if(!td.dataset.dropTarget){
    td.dataset.dropTarget = '1';
    td.style.outline = '2px solid #111';
    td.style.outlineOffset = '-2px';
  }
}

function calDragLeave(e){
  var td = e.currentTarget;
  if(!td.contains(e.relatedTarget)){
    td.style.outline=''; td.style.outlineOffset='';
    delete td.dataset.dropTarget;
  }
}

function calDrop(e, toRowId, toCi){
  e.preventDefault();
  if(!calDragging) return;
  if(calDragging.rowId !== toRowId){ calDragging=null; renderContent(); return; }
  if(calDragging.ci === toCi){ calDragging=null; renderContent(); return; }

  var moves = ST['cal_moves'] || [];
  // If task was previously moved, update its origin to current position
  var existing = moves.findIndex(function(m){ return m.rowId===calDragging.rowId && m.taskT===calDragging.taskT; });
  if(existing>=0){
    moves[existing].toCi = toCi;
  } else {
    moves.push({ rowId: calDragging.rowId, fromCi: calDragging.ci, toCi: toCi, taskT: calDragging.taskT });
  }
  // Remove no-op moves
  moves = moves.filter(function(m){ return m.fromCi !== m.toCi; });
  ST['cal_moves'] = moves;
  calDragging = null;
  save();
  renderContent();
}

function toggleCalByText(rowId, ci, encodedT){
  var t = decodeURIComponent(encodedT);
  var k = calKey(rowId, ci, t);
  ST[k] = !ST[k];
  save();
  updateGlobals();
  renderContent();
}

  var html = '';

    if(curFilter==='done'&&!done) return;

      +'<div class="task-cb'+(done?' chk':'')+'" onclick="event.stopPropagation();toggle(\''+secKey+'\','+si+','+ti+')">✓</div>'

      +'<div class="task-text" style="cursor:pointer" onclick="toggleDescGen(\''+secKey+'\','+si+','+ti+')">'+task.t
        +(task.desc?'<span class="desc-chevron'+(isExp?' open':'')+'">▾</span>':'')

      }).join('')
      +(task.c?'<div class="crit-dot" title="Критичный пункт"></div>':'')
      +'<div class="task-text wmk-text" style="cursor:grab" onclick="event.stopPropagation();toggleDesc('+si+','+ti+')">'+task.t
        +(task.desc?'<span class="desc-chevron'+(isExp?' open':'')+'">▾</span>':'')
      +'</div>'
      +'</div>';
    if(task.desc && isExp){
      html += '<div class="desc-row"><div class="desc-text">'+task.desc+'</div></div>';
    }
  });
  if(!any) html = '<div class="empty-state">'+
    (curFilter==='done'?'Нет выполненных задач':'Все задачи выполнены')+'</div>';
  return html;
}

function resetAll(){
  if(!confirm('Сбросить все отметки?')) return;
  ST = {};
  save();
  updateGlobals();
  renderContent();
}

// Init
setFilter('all');
updateGlobals();
renderContent();
</script>
